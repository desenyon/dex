name: qa

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  qa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: go test ./...
      - run: go vet ./...
      - run: bash -n scripts/install.sh scripts/build-release.sh
      - run: go build -o bin/dex ./cmd/dex
